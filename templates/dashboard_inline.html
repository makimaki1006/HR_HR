<html lang="ja">

    <title>求人ダッシュボード</title>
    <link rel="stylesheet" href="/static/css/tailwind-precompiled.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js" defer></script>

    <script>
    // Leaflet 遅延ローダー（地図タブ初回表示時にのみロード）
    window.ensureLeaflet=(function(){var p=null;return function(){if(window.L)return Promise.resolve();if(p)return p;p=new Promise(function(ok){var c=document.createElement('link');c.rel='stylesheet';c.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(c);var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.onload=ok;document.head.appendChild(s)});return p}})();
    </script>
</head>
<body class="bg-navy-900 text-slate-100 min-h-screen">
    <!-- 2026-05-15: 業種プルダウン(industry-panel)が overflow-x-hidden で切り取られる
         問題を修正。CSS 仕様で overflow-x: hidden + overflow-y 未指定だと暗黙的に
         overflow-y: auto になり Y 軸も clipping され、mt-1 で下に開く panel が
         header 下端で消える。overflow-x: clip は Y 軸への副作用が無く、現代
         ブラウザ (Chrome/Edge 90+, Firefox 81+, Safari 16+) で動作。
         未対応ブラウザは visible にフォールバックし、wrap で横スクロール抑止。 -->
    <header class="bg-navy-800 border-b border-slate-700 px-4 sm:px-6 py-3 flex items-center justify-between flex-wrap gap-2" style="overflow-x: clip;">
        <div class="flex items-center gap-2 sm:gap-4 flex-wrap">
            <h1 class="text-lg font-bold text-white">求人ダッシュボード</h1>
            <span class="text-slate-400 text-sm">📍</span>
            <label for="pref-select" class="sr-only">都道府県</label>
            <select id="pref-select" aria-label="都道府県を選択"
                class="bg-navy-700 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">全国</option>
                {{PREF_OPTIONS}}
            </select>
            <label for="muni-select" class="sr-only">市区町村</label>
            <select id="muni-select" aria-label="市区町村を選択"
                class="bg-navy-700 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">すべて</option>
                {{MUNI_OPTIONS}}
            </select>
            <span class="text-slate-400 text-sm">🏭</span>
            <div class="relative" id="industry-dropdown-container">
                <button type="button" id="industry-btn" onclick="toggleIndustryDropdown()"
                    aria-expanded="false" aria-haspopup="true" aria-controls="industry-panel"
                    class="bg-navy-700 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white min-w-0 sm:min-w-[180px] max-w-[60vw] sm:max-w-none flex items-center gap-1 cursor-pointer hover:border-slate-500 transition">
                    <span id="industry-btn-text">全産業</span>
                    <svg class="w-3 h-3 ml-auto flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div id="industry-panel" role="tree" aria-label="産業分類フィルタ" class="hidden absolute z-50 mt-1 bg-navy-700 border border-slate-600 rounded-lg shadow-xl"
                     style="max-height:70vh;overflow-y:auto;min-width:min(420px, calc(100vw - 2rem));padding:8px;">
                    <div class="flex justify-between items-center mb-2 pb-1 border-b border-slate-600">
                        <span class="text-xs text-slate-400">産業分類（大分類展開で中分類表示）</span>
                        <button type="button" onclick="clearIndustryFilter()" class="text-xs text-blue-400 hover:text-blue-300">全解除</button>
                    </div>
                    <div class="flex flex-wrap gap-1 mb-2 pb-1 border-b border-slate-700">
                        <span class="text-xs text-slate-500 mr-1 self-center">よく使う:</span>
                        <button type="button" onclick="applyPreset(['医療','老人福祉・介護'])" class="px-2 py-0.5 bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs rounded-full transition-colors">医療・介護</button>
                        <button type="button" onclick="applyPreset(['IT・通信'])" class="px-2 py-0.5 bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs rounded-full transition-colors">IT・通信</button>
                        <button type="button" onclick="applyPreset(['建設業','製造業'])" class="px-2 py-0.5 bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs rounded-full transition-colors">建設・製造</button>
                        <button type="button" onclick="applyPreset(['サービス業','飲食業','宿泊業','小売業'])" class="px-2 py-0.5 bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs rounded-full transition-colors">サービス全般</button>
                    </div>
                    <div id="industry-tree-list"><p class="text-slate-500 text-sm p-2">読み込み中...</p></div>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-4 flex-wrap">
            <button type="button" onclick="openIntegratedReport()" title="採用市場 統合PDFレポート（新しいタブで開く）"
                class="px-2 py-1 bg-blue-700 hover:bg-blue-600 text-white text-xs rounded transition">📄 統合PDF</button>
            <button type="button" onclick="navigateToTab('/tab/guide')" title="使い方ガイド"
                class="text-slate-400 hover:text-white text-sm transition p-1.5 rounded hover:bg-navy-700">?</button>
            <span class="text-slate-400 text-sm">ログイン: {{USER_EMAIL}}</span>
            <a href="/my/activity" class="text-slate-400 hover:text-white text-sm transition" title="自分の履歴">履歴</a>
            <a href="/my/profile" class="text-slate-400 hover:text-white text-sm transition" title="プロフィール編集">設定</a>
            <a href="/logout" class="text-slate-400 hover:text-white text-sm transition">ログアウト</a>
        </div>
    </header>

    <nav class="bg-navy-800 border-b border-slate-700 px-6 flex gap-1 overflow-x-auto scrollbar-thin" role="tablist" aria-label="ダッシュボードタブ" style="-webkit-overflow-scrolling:touch;scrollbar-width:thin">
        <!--
        2026-05-15: 未使用 8 タブ (市場概況/地域カルテ/詳細分析/総合診断/トレンド/
            都道府県比較/条件診断/採用診断) を UI から非表示。
            handler/route コードは温存 (将来 V2 ダッシュボード再設計で再利用可能)。
            URL 直接アクセス (/tab/market 等) は引き続き動作する。
        -->
        <button class="tab-btn active" role="tab" aria-selected="true" hx-get="/tab/jobmap" hx-target="#content" hx-swap="innerHTML"
            onclick="setActiveTab(this)">地図</button>
        <button class="tab-btn" role="tab" aria-selected="false" hx-get="/tab/survey" hx-target="#content" hx-swap="innerHTML"
            onclick="setActiveTab(this)">媒体分析</button>
        <button class="tab-btn" role="tab" aria-selected="false" hx-get="/tab/competitive" hx-target="#content" hx-swap="innerHTML"
            onclick="setActiveTab(this)">求人検索</button>
        <button class="tab-btn" role="tab" aria-selected="false" hx-get="/tab/company" hx-target="#content" hx-swap="innerHTML"
            onclick="setActiveTab(this)">企業検索</button>
        <button class="tab-btn" role="tab" aria-selected="false" hx-get="/tab/regional_analysis" hx-target="#content" hx-swap="innerHTML"
            onclick="setActiveTab(this)">地域分析</button>
        <button class="tab-btn" role="tab" aria-selected="false" hx-get="/tab/driver" hx-target="#content" hx-swap="innerHTML"
            onclick="setActiveTab(this)">職種カルテ</button>
        <button class="tab-btn" role="tab" aria-selected="false" hx-get="/tab/license" hx-target="#content" hx-swap="innerHTML"
            onclick="setActiveTab(this)">資格カルテ</button>
    </nav>

    <!-- ブレッドクラム: 現在の選択状態を表示 -->
    <div id="breadcrumb-bar" class="bg-navy-800/60 border-b border-slate-700/50 px-6 py-2 flex items-center gap-2 text-sm">
        <span class="text-slate-500">現在の表示:</span>
        <span id="bc-pref" class="bc-chip bc-chip-area">全国</span>
        <span id="bc-muni-sep" class="text-slate-600 hidden">›</span>
        <span id="bc-muni" class="bc-chip bc-chip-area hidden"></span>
        <span class="text-slate-600">|</span>
        <span class="text-slate-500">産業:</span>
        <span id="bc-job" class="bc-chip bc-chip-job">全産業</span>
    </div>

    <!-- ローディングオーバーレイ -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <main id="content" class="p-6" hx-history-elt>
        <div class="text-center text-slate-400 py-20">
            <p class="text-lg">読み込み中...</p>
        </div>
    </main>

    <script src="/static/js/tabcache.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/a11y.js" defer></script>
    <script>
    // タブ切替・フィルタ変更時のローディングフィードバック
    // 2026-06-05: 同タブ再クリックや afterSwap/afterSettle 不発火・通信エラー・
    //   タイムアウト時にオーバーレイが残留する問題に対応。
    //   開始は beforeRequest、終了は afterSettle に加え、必ず発火する
    //   afterRequest と error 系イベントでもフェイルセーフ解除する。
    (function() {
        function isContentReq(e) {
            var c = document.getElementById('content');
            return c && e && e.detail && e.detail.target === c;
        }
        function startLoading() {
            var c = document.getElementById('content');
            if (!c) return;
            c.classList.add('loading');
            var ov = document.getElementById('loading-overlay');
            if (ov) ov.classList.add('active');
        }
        function stopLoading(retriggerAnim) {
            var c = document.getElementById('content');
            if (!c) return;
            c.classList.remove('loading');
            c.style.opacity = '';
            var ov = document.getElementById('loading-overlay');
            if (ov) ov.classList.remove('active');
            if (retriggerAnim) {
                // コンテンツのフェードインアニメーションを再トリガー
                var children = c.children;
                for (var i = 0; i < children.length; i++) {
                    children[i].style.animation = 'none';
                    children[i].offsetHeight; // 強制リフロー
                    children[i].style.animation = '';
                }
            }
        }

        document.body.addEventListener('htmx:beforeRequest', function(e) {
            if (isContentReq(e)) startLoading();
        });
        document.body.addEventListener('htmx:afterSettle', function(e) {
            var c = document.getElementById('content');
            if (c) stopLoading(true);
        });
        // フェイルセーフ: afterRequest は成功・失敗いずれでも発火。
        // エラー/タイムアウトで afterSettle が来ないケースでもオーバーレイを解除する。
        document.body.addEventListener('htmx:afterRequest', function(e) {
            if (isContentReq(e)) stopLoading(false);
        });
        document.body.addEventListener('htmx:responseError', function() { stopLoading(false); });
        document.body.addEventListener('htmx:sendError', function() { stopLoading(false); });
        document.body.addEventListener('htmx:timeout', function() { stopLoading(false); });
    })();
    </script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/export.js"></script>
    <!-- 2026-05-15: region_karte.js は static/js/ に未存在 (過去削除済) で 404。
         地域カルテタブを UI 非表示化したので参照削除 (handler は温存). -->
    <!-- <script src="/static/js/region_karte.js"></script> -->

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // パーシャル直接アクセス対応 (?tab= で復元):
            // /tab/driver 等を直接開くとパーシャル HTML だけが返って nav が消えるため、
            // パーシャル側がトップに ?tab=/tab/driver でリダイレクトしてくる。それを受けて
            // 対応するタブを active 化 + HTMX swap で復元する。
            var params = new URLSearchParams(location.search);
            var requestedTab = params.get('tab');
            var DEFAULT_TAB = '/tab/jobmap';
            var targetUrl = DEFAULT_TAB;
            if (requestedTab && requestedTab.startsWith('/tab/')) {
                targetUrl = requestedTab;
                // 該当タブボタンを active 化 (基底パスでマッチ)
                var basePath = '/' + requestedTab.split('/').slice(1, 3).join('/');
                document.querySelectorAll('.tab-btn').forEach(function(b) {
                    var hxGet = b.getAttribute('hx-get') || '';
                    var isMatch = hxGet === basePath || requestedTab.startsWith(hxGet + '/');
                    b.classList.toggle('active', isMatch);
                    if (isMatch) b.setAttribute('aria-selected', 'true');
                    else b.setAttribute('aria-selected', 'false');
                });
                // ?tab= を URL から消す (履歴を汚さない、push でなく replace)
                var cleanUrl = location.pathname + location.hash;
                history.replaceState(null, '', cleanUrl);
            }
            htmx.ajax('GET', targetUrl, {target: '#content', swap: 'innerHTML'});

            // ブレッドクラム更新
            window.updateBreadcrumb = function() {
                var prefSel = document.getElementById('pref-select');
                var muniSel = document.getElementById('muni-select');
                var bcJob = document.getElementById('bc-job');
                var bcPref = document.getElementById('bc-pref');
                var bcMuni = document.getElementById('bc-muni');
                var bcMuniSep = document.getElementById('bc-muni-sep');

                if (bcJob) {
                    var btnText = document.getElementById('industry-btn-text');
                    bcJob.textContent = btnText ? btnText.textContent : '全産業';
                }
                if (prefSel && bcPref) {
                    bcPref.textContent = prefSel.value ? prefSel.options[prefSel.selectedIndex].text : '全国';
                    bcPref.classList.toggle('bc-chip-area-active', !!prefSel.value);
                }
                if (muniSel && bcMuni && bcMuniSep) {
                    if (muniSel.value) {
                        bcMuni.textContent = muniSel.options[muniSel.selectedIndex].text;
                        bcMuni.classList.remove('hidden');
                        bcMuniSep.classList.remove('hidden');
                    } else {
                        bcMuni.classList.add('hidden');
                        bcMuniSep.classList.add('hidden');
                    }
                }
            }

            // 初回表示時にブレッドクラム更新
            updateBreadcrumb();

            // アクティブタブ再読み込み共通関数
            function reloadActiveTab() {
                var activeBtn = document.querySelector('.tab-btn.active');
                if (activeBtn) {
                    var url = activeBtn.getAttribute('hx-get');
                    htmx.ajax('GET', url, {target: '#content', swap: 'innerHTML'});
                }
            }

            // セレクトボックスのオプション安全更新
            function safeSetOptions(selectEl, optionHtml, defaultOption) {
                while (selectEl.options.length > 0) { selectEl.remove(0); }
                var def = document.createElement('option');
                def.value = '';
                def.textContent = defaultOption;
                selectEl.appendChild(def);
                if (optionHtml) {
                    var tmp = document.createElement('select');
                    tmp.insertAdjacentHTML('afterbegin', optionHtml);
                    while (tmp.firstChild) { selectEl.appendChild(tmp.firstChild); }
                }
                selectEl.selectedIndex = 0;
            }

            // === 産業2階層ドロップダウン ===
            // 2026-05-15: `var _selectedIndustryRaws` は DOMContentLoaded コールバック内の
            //   ローカル変数で、他の <script> タグ (survey の openVariantReport 等) から
            //   typeof チェックすると undefined になり業界フィルタが永久に効かなかった。
            //   window に明示登録し、以降の代入も window. プレフィックス経由で行う。
            window._selectedJobTypes = {{SELECTED_JOB_TYPES_JSON}};
            window._selectedIndustryRaws = {{SELECTED_INDUSTRY_RAWS_JSON}};
            // ローカル var alias (既存コードの互換用、参照のみ。代入は window. 経由)
            var _selectedJobTypes = window._selectedJobTypes;
            var _selectedIndustryRaws = window._selectedIndustryRaws;
            var _industryTreeData = null;

            window.toggleIndustryDropdown = function() {
                var panel = document.getElementById('industry-panel');
                var btn = document.getElementById('industry-btn');
                if (panel.classList.contains('hidden')) {
                    panel.classList.remove('hidden');
                    if (btn) btn.setAttribute('aria-expanded', 'true');
                    if (!_industryTreeData) loadIndustryTree();
                } else {
                    panel.classList.add('hidden');
                    if (btn) btn.setAttribute('aria-expanded', 'false');
                }
            };

            // 2026-05-19: openVariantReport は元々 survey の HTMX 挿入レンダラ
            //   (src/handlers/survey/render.rs) 内 <script> タグで定義していたが、
            //   HTMX で動的挿入された <script> は eval されない → onclick で参照
            //   した時点で ReferenceError、結果 static href (pref/muni 含まず) に
            //   フォールバック navigate されていた。
            //   初期 page load で評価される本ファイルに移動して window に登録する。
            window.openVariantReport = function(ev, sid, variant) {
                try {
                    var pref = (document.getElementById('pref-select') || {}).value || '';
                    var muni = (document.getElementById('muni-select') || {}).value || '';
                    var industries = (typeof window._selectedIndustryRaws !== 'undefined' && Array.isArray(window._selectedIndustryRaws))
                        ? window._selectedIndustryRaws : [];
                    var jobTypes = (typeof window._selectedJobTypes !== 'undefined' && Array.isArray(window._selectedJobTypes))
                        ? window._selectedJobTypes : [];
                    var industry = industries.length > 0
                        ? industries[0]
                        : (jobTypes.length > 0 ? jobTypes[0] : '');
                    var url = '/report/survey?session_id=' + encodeURIComponent(sid)
                        + '&variant=' + encodeURIComponent(variant);
                    if (pref && pref !== '全国') url += '&pref=' + encodeURIComponent(pref);
                    if (muni && muni !== 'すべて') url += '&muni=' + encodeURIComponent(muni);
                    if (industry) url += '&industry=' + encodeURIComponent(industry);
                    if (ev) ev.preventDefault();
                    window.open(url, '_blank', 'noopener');
                    return false;
                } catch (e) {
                    console.error('openVariantReport failed', e);
                    return true;
                }
            };

            // 2026-07-13: Ver10 レポート専用。openVariantReport と同じ pref/muni/industry を
            //   組み立てつつ、チェックボックス #ver10-table2e の状態を &table2e=0/1 で付与する。
            //   HTMX 挿入 <script> は eval されないため、本ファイルで window に登録する。
            window.openVer10Report = function(ev, sid) {
                try {
                    if (ev) ev.preventDefault();
                    var pref = (document.getElementById('pref-select') || {}).value || '';
                    var muni = (document.getElementById('muni-select') || {}).value || '';
                    var industries = (typeof window._selectedIndustryRaws !== 'undefined' && Array.isArray(window._selectedIndustryRaws))
                        ? window._selectedIndustryRaws : [];
                    var jobTypes = (typeof window._selectedJobTypes !== 'undefined' && Array.isArray(window._selectedJobTypes))
                        ? window._selectedJobTypes : [];
                    var industry = industries.length > 0
                        ? industries[0]
                        : (jobTypes.length > 0 ? jobTypes[0] : '');
                    var cb = document.getElementById('ver10-table2e');
                    var table2e = (cb && cb.checked === false) ? '0' : '1';
                    var url = '/report/survey?session_id=' + encodeURIComponent(sid)
                        + '&variant=ver10'
                        + '&table2e=' + table2e;
                    if (pref && pref !== '全国') url += '&pref=' + encodeURIComponent(pref);
                    if (muni && muni !== 'すべて') url += '&muni=' + encodeURIComponent(muni);
                    if (industry) url += '&industry=' + encodeURIComponent(industry);
                    window.open(url, '_blank', 'noopener');
                    return false;
                } catch (e) {
                    console.error('openVer10Report failed', e);
                    return true;
                }
            };

            // 2026-07-10: セクション選択レポート (媒体分析タブ「出力する内容を選んで…」パネル)。
            //   openVariantReport と同根本 (HTMX 挿入 <script> は eval されない) のため
            //   本ファイルで window に登録する。チェックした .section-pick の value を
            //   カンマ連結して ?sections=... を組み立て、variant=extended 固定で開く。
            //   1 つも選ばれていない場合は 'none' を送り、サーバ側で最小構成 (表紙+要約+出典)
            //   として解釈させる (空文字列は「未指定=従来の全セクション」になるため使わない)。
            window.buildSectionsReport = function(ev, sid) {
                try {
                    if (ev) ev.preventDefault();
                    var pref = (document.getElementById('pref-select') || {}).value || '';
                    var muni = (document.getElementById('muni-select') || {}).value || '';
                    var industries = (typeof window._selectedIndustryRaws !== 'undefined' && Array.isArray(window._selectedIndustryRaws))
                        ? window._selectedIndustryRaws : [];
                    var jobTypes = (typeof window._selectedJobTypes !== 'undefined' && Array.isArray(window._selectedJobTypes))
                        ? window._selectedJobTypes : [];
                    var industry = industries.length > 0
                        ? industries[0]
                        : (jobTypes.length > 0 ? jobTypes[0] : '');
                    var codes = [];
                    document.querySelectorAll('.section-pick:checked').forEach(function(b) {
                        if (b.value) codes.push(b.value);
                    });
                    var sections = codes.length > 0 ? codes.join(',') : 'none';
                    var url = '/report/survey?session_id=' + encodeURIComponent(sid)
                        + '&variant=extended'
                        + '&sections=' + encodeURIComponent(sections);
                    if (pref && pref !== '全国') url += '&pref=' + encodeURIComponent(pref);
                    if (muni && muni !== 'すべて') url += '&muni=' + encodeURIComponent(muni);
                    if (industry) url += '&industry=' + encodeURIComponent(industry);
                    window.open(url, '_blank', 'noopener');
                    return false;
                } catch (e) {
                    console.error('buildSectionsReport failed', e);
                    return true;
                }
            };

            // 2026-07-10: セクション選択のショートカット (チェック状態を一括設定)。
            //   'standard' = 02-07 + 075 + 076 + 09 / 'full' = 全部 / 'minimal' = 全解除。
            window.applySectionPreset = function(preset) {
                var standard = ['02', '03', '04', '05', '06', '07', '075', '076', '09'];
                var full = ['02', '03', '04', '05', '06', '07', '075', '076', '09', '10'];
                var set = preset === 'full' ? full : (preset === 'standard' ? standard : []);
                document.querySelectorAll('.section-pick').forEach(function(b) {

            function _consultQueryString(sid) {

            window.downloadReportHtml = async function(sessionId) {

            function createSvgArrow(gid, rotated) {
                var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('class', 'w-4 h-4 text-slate-400 ind-arrow');
                svg.setAttribute('id', 'arrow-' + gid);
                svg.setAttribute('fill', 'none');
                svg.setAttribute('stroke', 'currentColor');
                svg.setAttribute('viewBox', '0 0 24 24');
                svg.style.cursor = 'pointer';
                svg.style.transition = 'transform 0.2s';
                if (rotated) svg.style.transform = 'rotate(90deg)';
                var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                path.setAttribute('stroke-width', '2');
                path.setAttribute('d', 'M9 5l7 7-7 7');
                svg.appendChild(path);
                svg.addEventListener('click', function() { toggleIndustrySubs(gid); });
                return svg;
            }

            function formatNum(n) {
                return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }

            function renderIndustryTree(tree) {
                var list = document.getElementById('industry-tree-list');
                while (list.firstChild) list.removeChild(list.firstChild);
                var frag = document.createDocumentFragment();

                for (var i = 0; i < tree.length; i++) {
                    var group = tree[i];
                    var gid = 'ig-' + i;
                    var majorChecked = _selectedJobTypes.indexOf(group.major) >= 0;
                    var hasSubSel = false;
                    for (var k = 0; k < group.subs.length; k++) {
                        if (_selectedIndustryRaws.indexOf(group.subs[k].name) >= 0) { hasSubSel = true; break; }
                    }

                    // 大分類行
                    var row = document.createElement('div');
                    row.className = 'flex items-center gap-2 py-2 px-1 hover:bg-slate-600/40 rounded cursor-pointer';

                    var cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.id = 'ind-major-' + i;
                    cb.className = 'ind-major-cb accent-blue-500';
                    cb.value = group.major;
                    if (majorChecked) cb.checked = true;
                    // イベントデリゲーションで処理するため個別ハンドラ不要
                    var cbLabel = document.createElement('label');
                    cbLabel.className = 'flex items-center justify-center w-8 h-8 cursor-pointer flex-shrink-0';
                    cbLabel.setAttribute('for', 'ind-major-' + i);
                    cbLabel.appendChild(cb);
                    row.appendChild(cbLabel);

                    var label = document.createElement('span');
                    label.className = 'text-sm text-white flex-1 select-none';
                    label.textContent = group.major;
                    (function(id) { label.addEventListener('click', function() { toggleIndustrySubs(id); }); })(gid);
                    row.appendChild(label);

                    var cnt = document.createElement('span');
                    cnt.className = 'text-xs text-slate-400';
                    cnt.textContent = formatNum(group.major_count);
                    row.appendChild(cnt);

                    // 中分類がある場合のみ矢印表示
                    if (group.subs.length > 0) {
                        row.appendChild(createSvgArrow(gid, hasSubSel));
                    }
                    frag.appendChild(row);

                    // 中分類パネル（中分類がある場合のみ）
                    var subsDiv = document.createElement('div');
                    subsDiv.id = gid;
                    subsDiv.className = 'pl-6 ' + (hasSubSel ? '' : 'hidden');
                    for (var j = 0; j < group.subs.length; j++) {
                        var sub = group.subs[j];
                        var subChecked = _selectedIndustryRaws.indexOf(sub.name) >= 0;
                        var subRow = document.createElement('div');
                        subRow.className = 'flex items-center gap-2 py-1.5 px-1 hover:bg-slate-600/30 rounded';

                        var scb = document.createElement('input');
                        scb.type = 'checkbox';
                        scb.id = 'ind-sub-' + i + '-' + j;
                        scb.className = 'ind-sub-cb accent-blue-400';
                        scb.setAttribute('data-major', group.major);
                        scb.value = sub.name;
                        if (subChecked) scb.checked = true;
                        // イベントデリゲーションで処理するため個別ハンドラ不要
                        var scbLabel = document.createElement('label');
                        scbLabel.className = 'flex items-center justify-center w-7 h-7 cursor-pointer flex-shrink-0';
                        scbLabel.setAttribute('for', 'ind-sub-' + i + '-' + j);
                        scbLabel.appendChild(scb);
                        subRow.appendChild(scbLabel);

                        var slabel = document.createElement('span');
                        slabel.className = 'text-xs text-slate-300 flex-1 select-none';
                        slabel.textContent = sub.name;
                        subRow.appendChild(slabel);

                        var scnt = document.createElement('span');
                        scnt.className = 'text-xs text-slate-500';
                        scnt.textContent = formatNum(sub.count);
                        subRow.appendChild(scnt);

                        subsDiv.appendChild(subRow);
                    }
                    frag.appendChild(subsDiv);
                }

                // 適用ボタン
                var applyRow = document.createElement('div');
                applyRow.className = 'mt-2 pt-2 border-t border-slate-600 flex justify-end';
                applyRow.style.position = 'sticky';
                applyRow.style.bottom = '0';
                applyRow.style.backgroundColor = '#1e293b';
                applyRow.style.zIndex = '10';
                applyRow.style.paddingBottom = '4px';
                var applyBtn = document.createElement('button');
                applyBtn.type = 'button';
                applyBtn.className = 'bg-blue-600 hover:bg-blue-500 text-white text-xs px-4 py-1.5 rounded transition';
                applyBtn.textContent = '適用';
                applyBtn.addEventListener('click', applyIndustryFilter);
                applyRow.appendChild(applyBtn);
                frag.appendChild(applyRow);

                list.appendChild(frag);
            }

            function updateIndustryLabel() {
                var majors = [], subs = [];
                document.querySelectorAll('.ind-major-cb:checked').forEach(function(cb) { majors.push(cb.value); });
                document.querySelectorAll('.ind-sub-cb:checked').forEach(function(cb) { subs.push(cb.value); });
                var btn = document.getElementById('industry-btn-text');
                var btnEl = document.getElementById('industry-btn');
                if (!btn) return;

                var text = '全産業';
                var allNames = majors.concat(subs);

                if (allNames.length === 0) {
                    text = '全産業';
                } else if (allNames.length <= 2) {
                    text = allNames.join(', ');
                } else {
                    text = allNames[0] + ' 他' + (allNames.length - 1) + '件';
                }

                btn.textContent = text;
                if (btnEl && allNames.length > 0) {
                    btnEl.title = allNames.join('\n');
                } else if (btnEl) {
                    btnEl.title = '';
                }
            }

                muniSelect.selectedIndex = 0;

                if (muni) {
                    fetch('/api/set_municipality', {

                        var activeBtn = document.querySelector('.tab-btn.active');
                        if (activeBtn) {
                            var url = activeBtn.getAttribute('hx-get');
                            htmx.ajax('GET', url, {target: '#content', swap: 'innerHTML'});
                        }
                    });
                } else {
                    fetch('/api/set_municipality', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'municipality='
                    }).then(function() {
                        if (window.updateBreadcrumb) window.updateBreadcrumb();
                        var activeBtn = document.querySelector('.tab-btn.active');
                        if (activeBtn) {
                            var url = activeBtn.getAttribute('hx-get');
                            htmx.ajax('GET', url, {target: '#content', swap: 'innerHTML'});
                        }
                    });
                }
            });
        }
        // カラム表示トグル（競合検索テーブル）
        function toggleCompColumns() {
            var btn = document.getElementById('comp-col-toggle');
            var hidden = document.querySelectorAll('.comp-col-extra');
            if (!hidden.length) return;
            var isHidden = hidden[0].style.display === 'none' || hidden[0].style.display === '';
            hidden.forEach(function(el) { el.style.display = isHidden ? '' : 'none'; });
            if (btn) btn.textContent = isHidden ? '主要カラムのみ表示' : '全カラム表示';
        }

        // 統合PDFレポートを新しいタブで開く（現在のフィルタ条件を引き継ぐ）
        function openIntegratedReport() {
            var prefSel = document.getElementById('pref-select');
            var muniSel = document.getElementById('muni-select');
            var pref = prefSel ? prefSel.value : '';
            var muni = muniSel ? muniSel.value : '';
            var qs = [];
            if (pref) qs.push('prefecture=' + encodeURIComponent(pref));
            if (muni) qs.push('municipality=' + encodeURIComponent(muni));
            var url = '/report/integrated' + (qs.length ? ('?' + qs.join('&')) : '');
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        // 総合診断レポートJSON出力
        function downloadInsightReport() {
            fetch('/api/insight/report')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = 'insight_report_' + new Date().toISOString().slice(0,10) + '.json';
                    a.click();
                    URL.revokeObjectURL(url);
                })
                .catch(function(e) { alert('レポート生成に失敗しました'); });
        }
    </script>
</body>
</html>
