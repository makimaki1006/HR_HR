name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt -- --check
      - name: Clippy (errors only; warnings reported but non-blocking)
        run: cargo clippy --all-targets
      - name: Unit tests
        run: cargo test --lib
      - name: Build release
        run: cargo build --release

  security-audit:
    runs-on: ubuntu-latest
    # 既知の依存脆弱性（別途 .cargo/audit.toml で ignore 登録）。
    # 発見時は GitHub Issue が自動作成されるがジョブ失敗はCI全体の赤化を招くため許容。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/audit@v1

  # Slack 通知: CI 失敗時のみ送信（Secrets.SLACK_WEBHOOK_URL が未設定なら実行時にskip）
  notify:
    runs-on: ubuntu-latest
    needs: [rust-test]
    if: failure()
    steps:
      - name: Slack notification on failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 CI failure on ${{ github.repository }} @ ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "$SLACK_WEBHOOK_URL"
