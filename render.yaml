services:
  - type: web
    name: hellowork-dashboard
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /health
    dockerArgs:
      GITHUB_TOKEN:
        sync: false
    envVars:
      - key: PORT
        value: "9216"
      - key: RUST_LOG
        value: info
      - key: AUTH_PASSWORD
        sync: false
      - key: ALLOWED_DOMAINS
        value: "f-a-c.co.jp,cyxen.co.jp"
      - key: HELLOWORK_DB_PATH
        value: "data/hellowork.db"
      - key: TURSO_EXTERNAL_URL
        sync: false
      - key: TURSO_EXTERNAL_TOKEN
        sync: false
