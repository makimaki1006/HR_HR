# =============================================================================
# data_sources.yaml — データソース・レジストリ (機械可読カタログ)
# =============================================================================
# docs/DATA_CATALOG.md の §1 を機械可読化したもの。
# pipeline.py がこれを読み、「○○のデータ更新」を共通フローで回す。
#
# 🔴 CLAUDE.md: Claude による DB 書き込み禁止。
#   upload(投入) フェーズは pipeline.py が "手動実行コマンド" を表示するのみ。
#   実際の Turso 投入はユーザーが手動で行う。
#
# 各エントリのフィールド:
#   name         : 一意キー (pipeline.py --update <name> で指定)
#   source       : 取得元系統 (hw / hw_timeseries / salesnow / e-stat / manual / other-api)
#   stats_data_id: e-Stat statsDataId (該当する場合)
#   fetch        : 取得スクリプト (scripts/ 配下、省略可)
#   transform    : 加工スクリプト (scripts/ 配下、省略可)
#   upload       : 投入スクリプト (手動実行対象、省略可)
#   table        : 投入先テーブル名
#   granularity  : prefecture / municipality / national / facility / corporate / od
#   freshness_col: 鮮度カラム (null = 鮮度メタなし。要改善)
#   frequency    : monthly / quarterly / yearly / quinquennial(5年) / irregular / continuous
#   manual_consts: 年度更新時に手で直す定数 (compute_v2_external.py 等。空配列=なし)
#   tabs         : 活用先タブ (jobmap/survey/competitive/company=表示4タブ,
#                  navy=採用診断レポート, analysis/karte/trend 等=非表示タブ)
#   status       : visible(表示4タブ) / report(navyのみ) / hidden(非表示タブのみ) / unused
#   notes        : 補足
# =============================================================================

sources:
